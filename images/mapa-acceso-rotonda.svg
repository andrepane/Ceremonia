<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Indicaciones de acceso desde la rotonda</title>
  <desc id="desc">Esquema de rutas de acceso desde Vera y Garrucha hasta la rotonda de la A-352 con indicaciones para tomar el camino de servicio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1EE"/>
      <stop offset="1" stop-color="#EAE8F8"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#402F2B" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>

  <rect x="52" y="44" width="300" height="120" rx="24" fill="#FFFFFF" stroke="#D7CAC1"/>
  <text x="84" y="92" fill="#322823" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">A-352</text>
  <text x="84" y="136" fill="#665A53" font-family="Inter, Arial, sans-serif" font-size="36">Carretera · Km 5</text>

  <g filter="url(#shadow)">
    <circle cx="520" cy="390" r="44" fill="#FFFFFF" stroke="#6652D9" stroke-width="12"/>
    <text x="460" y="470" fill="#4D3CB3" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">ROTONDA</text>
  </g>

  <path d="M140 210C280 210 340 330 420 390" stroke="#2BCFD2" stroke-width="18" stroke-linecap="round"/>
  <circle cx="140" cy="210" r="20" fill="#2BCFD2"/>
  <rect x="170" y="120" width="470" height="130" rx="20" fill="#FFFFFF" stroke="#2BCFD2" stroke-width="4"/>
  <text x="196" y="172" fill="#17323A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Acceso Vera → Garrucha</text>
  <text x="196" y="214" fill="#33555D" font-family="Inter, Arial, sans-serif" font-size="30">Indicaciones: Puerto Rey - Playas de Vera</text>

  <path d="M965 265C875 278 730 300 560 390" stroke="#C52DE4" stroke-width="18" stroke-linecap="round"/>
  <circle cx="980" cy="260" r="20" fill="#C52DE4"/>
  <rect x="660" y="90" width="500" height="140" rx="20" fill="#FFFFFF" stroke="#C52DE4" stroke-width="4"/>
  <text x="688" y="146" fill="#3D113F" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Acceso Garrucha → Vera</text>
  <text x="688" y="188" fill="#5B2A65" font-family="Inter, Arial, sans-serif" font-size="30">Indicaciones: Puerto Rey - Playas de Vera</text>

  <path d="M510 432C510 520 460 550 420 550C380 550 320 510 322 430C324 360 376 332 420 332" stroke="#1454E0" stroke-width="16" stroke-linecap="round"/>
  <path d="M422 548C580 620 690 745 635 810C572 882 365 844 248 794" stroke="#1454E0" stroke-width="16" stroke-linecap="round"/>
  <rect x="70" y="590" width="540" height="184" rx="20" fill="#FFFFFF" stroke="#1454E0" stroke-width="4"/>
  <text x="102" y="654" fill="#152953" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">En la rotonda:</text>
  <text x="102" y="702" fill="#2C3F69" font-family="Inter, Arial, sans-serif" font-size="36">tomar camino de servicio</text>
  <text x="102" y="748" fill="#2C3F69" font-family="Inter, Arial, sans-serif" font-size="36">y seguir indicaciones</text>
</svg>

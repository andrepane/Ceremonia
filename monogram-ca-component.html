<div style="display:block; width:320px; max-width:320px;">
  <style>
    .ca-monogram-wrap {
      display: block;
      width: 320px;
      height: 220px;
      line-height: 0;
    }

    .ca-monogram-svg {
      display: block;
      width: 320px;
      height: 220px;
      overflow: visible;
    }

    .ca-stroke-c,
    .ca-stroke-a {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .ca-stroke-c {
      stroke-dasharray: 560;
      stroke-dashoffset: 560;
      animation: ca-write-c 650ms cubic-bezier(0.32, 0, 0.2, 1) 200ms forwards;
    }

    .ca-stroke-a {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: ca-write-a 550ms cubic-bezier(0.35, 0.05, 0.2, 1) 850ms forwards;
    }

    @keyframes ca-write-c {
      from { stroke-dashoffset: 560; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes ca-write-a {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ca-stroke-c,
      .ca-stroke-a {
        animation: none;
        stroke-dasharray: none;
        stroke-dashoffset: 0;
      }
    }
  </style>

      <path

  </div>
</div>
